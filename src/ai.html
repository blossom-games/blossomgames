<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blossom AI</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
    const params = new URLSearchParams(window.location.search);
    if (params.get('accent')) document.documentElement.style.setProperty('--accent-color', params.get('accent'));
    if (params.get('bg')) document.documentElement.style.setProperty('--bg-dark', params.get('bg'));
    </script>
    <style>
        :root {
            --accent-color: #f48fb1;
            --accent-glow: rgba(244, 143, 177, 0.3);
            --bg-dark: #0e0a0f;
            --text-main: #fce4ec;
            --sidebar-width: 220px;
            --font-family: 'Segoe UI', system-ui, sans-serif;
            --gradient: linear-gradient(135deg, #f48fb1, #ce93d8);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html {
            background-color: var(--bg-dark);
            color: var(--accent-color);
            font-family: var(--font-family, 'Segoe UI', system-ui, sans-serif);
            padding: 0; margin: 0; height: 100vh; overflow: hidden;
        }
        ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: rgba(244,143,177,0.4); border-radius: 4px; }

        .top-menu-right { position: fixed; top: 20px; right: 20px; z-index: 2000; display: flex; gap: 16px; align-items: center; }
        .top-menu-left { position: fixed; top: 20px; left: 20px; z-index: 1400; display: flex; gap: 14px; align-items: center; }
        .icon-btn { width: 36px; height: 36px; cursor: pointer; color: var(--accent-color); opacity: 0.75; transition: 0.2s; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(244,143,177,0.15); border-radius: 10px; background: rgba(244,143,177,0.05); }
        .icon-btn:hover { opacity: 1; background: rgba(244,143,177,0.12); border-color: var(--accent-color); transform: scale(1.05); }
        .icon-btn svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

        #history-sidebar { position: fixed; top: 0; left: 0; width: var(--sidebar-width); height: 100vh; background: rgba(14,10,15,0.95); border-right: 1px solid rgba(244,143,177,0.1); z-index: 1600; display: flex; flex-direction: column; transform: translateX(calc(-1 * var(--sidebar-width))); transition: transform 0.3s cubic-bezier(0.16,1,0.3,1); backdrop-filter: blur(12px); }
        #history-sidebar.open { transform: translateX(0); }
        .sidebar-header { padding: 20px 16px 12px; border-bottom: 1px solid rgba(244,143,177,0.08); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
        .sidebar-title { font-size: 10px; letter-spacing: 3px; color: var(--accent-color); opacity: 0.7; text-transform: uppercase; }
        .sidebar-close { font-size: 16px; cursor: pointer; opacity: 0.4; transition: 0.2s; color: var(--accent-color); }
        .sidebar-close:hover { opacity: 1; }
        #history-list { flex: 1; overflow-y: auto; padding: 10px 8px; display: flex; flex-direction: column; gap: 4px; }
        .history-empty { font-size: 11px; color: rgba(244,143,177,0.3); text-align: center; padding: 30px 10px; }
        .history-item { display: flex; align-items: center; border-radius: 10px; cursor: pointer; transition: 0.15s; border: 1px solid transparent; overflow: hidden; }
        .history-item:hover { background: rgba(244,143,177,0.05); border-color: rgba(244,143,177,0.1); }
        .history-item.active { background: rgba(244,143,177,0.08); border-color: rgba(244,143,177,0.2); }
        .history-item-label { flex: 1; padding: 9px 10px; font-size: 11px; color: rgba(252,228,236,0.7); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .history-item.active .history-item-label { color: var(--accent-color); }
        .history-delete { padding: 9px 8px; color: transparent; font-size: 12px; cursor: pointer; transition: 0.15s; }
        .history-item:hover .history-delete { color: rgba(240,98,146,0.5); }
        .history-delete:hover { color: #f06292 !important; }

        #sidebar-backdrop { display: none; position: fixed; inset: 0; z-index: 1400; }
        #sidebar-backdrop.visible { display: block; }

        #settings-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(14,10,15,0.92); backdrop-filter: blur(8px); z-index: 3000; justify-content: center; align-items: center; }
        .modal-content { background: rgba(14,10,15,0.98); border: 1px solid rgba(244,143,177,0.3); width: 500px; max-width: 95%; border-radius: 20px; overflow: hidden; box-shadow: 0 0 40px rgba(244,143,177,0.15); }
        .modal-tabs { display: flex; border-bottom: 1px solid rgba(244,143,177,0.08); }
        .tab { flex: 1; padding: 14px; text-align: center; cursor: pointer; font-size: 11px; opacity: 0.5; font-weight: 500; transition: 0.2s; }
        .tab.active { opacity: 1; border-bottom: 2px solid var(--accent-color); color: var(--accent-color); }
        .modal-body { padding: 22px; max-height: 65vh; overflow-y: auto; }
        .setting-field { margin-bottom: 18px; }
        .setting-field label { display: block; font-size: 10px; margin-bottom: 7px; color: var(--accent-color); text-transform: uppercase; letter-spacing: 1px; opacity: 0.8; }
        .setting-field input, .setting-field textarea, .setting-field select { width: 100%; background: rgba(244,143,177,0.05); border: 1px solid rgba(244,143,177,0.15); border-radius: 10px; color: #fce4ec; padding: 10px 12px; font-family: inherit; outline: none; transition: 0.2s; }
        .setting-field input:focus, .setting-field textarea:focus { border-color: var(--accent-color); background: rgba(244,143,177,0.08); }
        .modal-footer { display: flex; gap: 10px; padding: 18px; }
        .modal-btn { flex: 1; padding: 11px; border: 1px solid rgba(244,143,177,0.3); background: transparent; color: var(--accent-color); cursor: pointer; font-family: inherit; border-radius: 10px; transition: 0.2s; font-size: 12px; }
        .modal-btn.primary { background: var(--gradient); color: #fff; font-weight: 600; border: none; }
        .modal-btn:hover { background: rgba(244,143,177,0.1); }
        .modal-btn.primary:hover { opacity: 0.88; }
        .toggle-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
        .toggle-label-text { font-size: 11px; color: var(--accent-color); text-transform: uppercase; letter-spacing: 1px; opacity: 0.8; }
        .toggle-switch { position: relative; width: 40px; height: 20px; flex-shrink: 0; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider { position: absolute; inset: 0; background: rgba(244,143,177,0.1); border: 1px solid rgba(244,143,177,0.2); border-radius: 20px; cursor: pointer; transition: 0.3s; }
        .toggle-slider:before { content: ''; position: absolute; height: 14px; width: 14px; left: 2px; top: 2px; background: var(--accent-color); border-radius: 50%; transition: 0.3s; opacity: 0.4; }
        input:checked + .toggle-slider { border-color: var(--accent-color); background: rgba(244,143,177,0.15); }
        input:checked + .toggle-slider:before { transform: translateX(20px); opacity: 1; }
        .api-link { color: var(--accent-color); text-decoration: underline; }
        .key-info-box { background: rgba(244,143,177,0.04); border: 1px solid rgba(244,143,177,0.12); border-radius: 10px; padding: 12px 14px; font-size: 11px; color: rgba(179,157,172,0.9); line-height: 1.7; margin-bottom: 14px; }
        .key-info-box strong { color: var(--accent-color); }
        .setting-divider { border: none; border-top: 1px solid rgba(244,143,177,0.08); margin: 14px 0; }

        #app-container { display: flex; flex-direction: column; height: 100vh; }
        .center-wrapper { display: flex; flex-direction: column; justify-content: center; align-items: center; flex-grow: 1; transition: all 0.7s cubic-bezier(0.16,1,0.3,1); }
        body.chat-active .center-wrapper { position: fixed; top: 0; left: 0; right: 0; z-index: 500; flex-grow: 0; height: 68px; flex-direction: row; justify-content: center; padding: 0; border-bottom: 1px solid rgba(244,143,177,0.08); background: rgba(14,10,15,0.95); backdrop-filter: blur(10px); }
        body.chat-active #response-viewport { padding-top: 68px; }
        .pulse-star { font-size: 52px; display: inline-block; cursor: pointer; filter: drop-shadow(0 0 14px rgba(244,143,177,0.5)); }
        body.chat-active .pulse-star { font-size: 26px; margin-right: 14px; }
        .center-text { font-size: 22px; font-weight: 700; text-align: center; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        body.chat-active .center-text { display: none; }
        .center-sub { font-size: 11px; color: rgba(179,157,172,0.6); letter-spacing: 3px; text-transform: uppercase; margin-top: 6px; }
        body.chat-active .center-sub { display: none; }

        #response-viewport { flex-grow: 1; overflow-y: auto; width: 100%; display: none; flex-direction: column; }
        body.chat-active #response-viewport { display: flex; }
        #response-container { width: 800px; max-width: 90%; margin: 0 auto; display: flex; flex-direction: column; gap: 22px; padding: 36px 0 200px 0; }

        .user-message { align-self: flex-end; color: #fce4ec; background: rgba(244,143,177,0.08); border: 1px solid rgba(244,143,177,0.2); padding: 14px 18px; border-radius: 18px 18px 4px 18px; max-width: 75%; }
        .bot-message-wrapper { display: flex; align-items: flex-start; gap: 14px; align-self: flex-start; max-width: 85%; }
        .bot-content { background: rgba(244,143,177,0.04); border: 1px solid rgba(244,143,177,0.12); padding: 16px 20px; border-radius: 4px 18px 18px 18px; width: 100%; }
        .bot-label-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .bot-label { font-size: 10px; color: var(--accent-color); opacity: 0.7; font-weight: 600; letter-spacing: 2px; }
        .text-body { line-height: 1.65; color: #fce4ec; font-size: 14.5px; }
        .text-body p { margin-bottom: 10px; }
        .text-body pre { background: rgba(14,10,15,0.8); padding: 12px; border: 1px solid rgba(244,143,177,0.12); border-radius: 8px; overflow-x: auto; margin: 10px 0; }
        .text-body code { font-family: 'Courier New', monospace; background: rgba(244,143,177,0.08); padding: 2px 5px; border-radius: 4px; }
        .rate-limit-banner { background: rgba(240,98,146,0.07); border: 1px solid rgba(240,98,146,0.3); border-radius: 10px; padding: 12px 16px; font-size: 12px; color: rgba(240,140,150,0.9); display: flex; align-items: center; justify-content: space-between; gap: 12px; }

        .search-area-wrapper { position: fixed; bottom: 0; left: 0; right: 0; background: linear-gradient(to top, var(--bg-dark) 65%, transparent); padding: 18px 0 36px 0; display: flex; flex-direction: column; align-items: center; z-index: 100; }
        .preview-container { width: 680px; max-width: 92%; display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
        .preview-item { position: relative; width: 50px; height: 50px; border: 1px solid rgba(244,143,177,0.3); border-radius: 8px; overflow: hidden; }
        .preview-item img { width: 100%; height: 100%; object-fit: cover; }
        .remove-img { position: absolute; top: 0; right: 0; background: rgba(14,10,15,0.8); color: #f06292; font-size: 10px; cursor: pointer; padding: 0 3px; }
        .search-bar { width: 680px; max-width: 92%; background: rgba(244,143,177,0.06); border: 1px solid rgba(244,143,177,0.18); border-radius: 16px; padding: 12px 18px; display: flex; align-items: center; gap: 14px; box-shadow: 0 4px 24px rgba(244,143,177,0.08); }
        .search-bar:focus-within { border-color: rgba(244,143,177,0.45); background: rgba(244,143,177,0.09); }
        .upload-btn { cursor: pointer; color: var(--accent-color); font-size: 20px; transition: 0.2s; user-select: none; display: flex; align-items: center; }
        .upload-btn:hover { transform: scale(1.15); filter: drop-shadow(0 0 6px var(--accent-color)); }
        .search-bar input { background: none; border: none; color: #fce4ec; font-size: 15px; flex-grow: 1; outline: none; font-family: inherit; }
        .search-bar input::placeholder { color: rgba(179,157,172,0.5); }
        .send-btn { cursor: pointer; color: var(--accent-color); font-size: 20px; transition: 0.2s; display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; }
        .send-btn:hover { transform: scale(1.1); filter: drop-shadow(0 0 8px var(--accent-color)); }
        .send-btn.generating::before { content: "◻"; font-size: 22px; }
        .send-btn.idle::before { content: "➤"; }
        .upload-counter { font-size: 10px; color: rgba(179,157,172,0.5); white-space: nowrap; }
        .session-stats { font-size: 9px; opacity: 0.3; margin-top: 7px; letter-spacing: 1px; text-transform: uppercase; color: rgba(179,157,172,0.8); }
    </style>
</head>
<body id="main-body">
<div class="top-menu-left">
    <div class="icon-btn" onclick="toggleSidebar()" title="Chat History">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15.5 14.5"/></svg>
    </div>
    <div class="icon-btn" onclick="startNewChat()" title="New Chat">
        <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
    </div>
</div>
<div class="top-menu-right">
    <div class="icon-btn" onclick="openModal('settings-modal')" title="Settings">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33A1.65 1.65 0 0 0 14 18.87V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9z"/></svg>
    </div>
</div>

<div id="sidebar-backdrop" onclick="closeSidebar()"></div>
<div id="history-sidebar">
    <div class="sidebar-header">
        <span class="sidebar-title">Sessions</span>
        <span class="sidebar-close" onclick="closeSidebar()">✕</span>
    </div>
    <div id="history-list"><div class="history-empty" id="history-empty">No sessions yet.</div></div>
</div>

<div id="settings-modal">
    <div class="modal-content">
        <div class="modal-tabs">
            <div class="tab active" onclick="switchTab('general')">General</div>
            <div class="tab" onclick="switchTab('model')">Model</div>
            <div class="tab" onclick="switchTab('appearance')">Appearance</div>
        </div>
        <div class="modal-body" id="modal-body">
            <div id="tab-general">
                <div class="key-info-box"><strong>🌸 Blossom AI</strong><br>Powered by Groq. Your API key is configured. Chat away!</div>
                <hr class="setting-divider">
                <div class="setting-field"><label>System Instructions</label><textarea id="sys-prompt" rows="7">You are Blossom AI, a helpful, friendly, and cheerful assistant for Blossom Games. Be warm, supportive, and occasionally playful 🌸</textarea></div>
            </div>
            <div id="tab-model" style="display:none;">
                <div class="setting-field"><label>Model</label>
                    <select id="active-model">
                        <option value="llama-3.3-70b-versatile">llama-3.3-70b-versatile</option>
                        <option value="llama-3.1-8b-instant">llama-3.1-8b-instant (Fast)</option>
                        <option value="moonshotai/kimi-k2-instruct">kimi-k2-instruct</option>
                    </select>
                </div>
                <div style="display:flex;gap:14px;">
                    <div class="setting-field" style="flex:1;"><label>Temperature</label><input type="number" id="param-temp" value="0.7" step="0.1" min="0" max="2"></div>
                    <div class="setting-field" style="flex:1;"><label>Top-P</label><input type="number" id="param-top-p" value="1.0" step="0.05"></div>
                </div>
            </div>
            <div id="tab-appearance" style="display:none;">
                <div class="setting-field"><label>Accent Color</label><input type="color" id="custom-color" value="#f48fb1" oninput="updateAccentColor(this.value)" style="height:38px;border-radius:10px;cursor:pointer;border:none;padding:2px 4px;"></div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="modal-btn" onclick="startNewChat();closeModal('settings-modal');">New Chat</button>
            <button class="modal-btn primary" onclick="closeModal('settings-modal')">Done</button>
        </div>
    </div>
</div>

<div id="app-container">
    <div class="center-wrapper">
        <div class="pulse-star" id="main-star">🌸</div>
        <div>
            <div class="center-text">Blossom AI</div>
            <div class="center-sub">✦ Ask me anything ✦</div>
        </div>
    </div>
    <div id="response-viewport"><div id="response-container"></div></div>
</div>

<div class="search-area-wrapper">
    <div id="preview-bar" class="preview-container"></div>
    <div class="search-bar">
        <input type="file" id="image-upload" accept="image/*" style="display:none;" multiple onchange="handleFileUpload(this)">
        <div class="upload-btn" id="upload-btn" onclick="document.getElementById('image-upload').click()" title="Upload image">🖼️</div>
        <input type="text" id="chat-input" placeholder="Chat with Blossom AI…" autocomplete="off">
        <div id="upload-count" class="upload-counter">0/5</div>
        <div class="send-btn idle" id="send-btn" onclick="handleAction()"></div>
    </div>
    <div class="session-stats" id="session-stats">🌸 Blossom AI · Powered by Groq</div>
</div>

<script>
const GROQ_API_KEY = "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";
const VISION_MODEL = "meta-llama/llama-4-scout-17b-16e-instruct";
const MAX_HISTORY = 6;
const HISTORY_KEY = 'blossom_ai_sessions';

let sessions = [], activeSessionId = null;
let isFirstMessage = true, isGenerating = false, abortController = null;
let selectedFiles = [], rotationAngle = 0, animationFrameId = null;
let currentHistory = [];

const inputField = document.getElementById('chat-input');
const responseBox = document.getElementById('response-container');
const viewport = document.getElementById('response-viewport');
const body = document.getElementById('main-body');
const star = document.getElementById('main-star');
const sendBtn = document.getElementById('send-btn');
const previewBar = document.getElementById('preview-bar');
const uploadCounter = document.getElementById('upload-count');

// Sync theme from parent
function syncTheme() {
    if(window.self !== window.top){
        window.addEventListener('message', e => {
            if(e.data?.type === 'GHOSTLINK_THEME_DATA'){
                const {accent,bg,font} = e.data.theme;
                if(accent){ document.documentElement.style.setProperty('--accent-color',accent); document.documentElement.style.setProperty('--accent-glow',accent+'4D'); }
                if(bg) document.documentElement.style.setProperty('--bg-dark',bg);
                if(font) document.documentElement.style.setProperty('--font-family',font);
            }
        });
        window.parent.postMessage({type:'GHOSTLINK_QUERY_THEME'},'*');
    }
}
document.addEventListener('DOMContentLoaded', syncTheme);

// Sessions
function loadSessions(){ try{ sessions=JSON.parse(localStorage.getItem(HISTORY_KEY)||'[]'); }catch{ sessions=[]; } }
function saveSessions(){ localStorage.setItem(HISTORY_KEY,JSON.stringify(sessions)); }
function createSession(first){ const id='s_'+Date.now(); const title=(first.trim().slice(0,18)||'New Chat')+(first.length>18?'…':''); sessions.unshift({id,title,history:[],timestamp:Date.now()}); activeSessionId=id; saveSessions(); renderSidebar(); return sessions[0]; }
function updateSession(){ if(!activeSessionId) return; const s=sessions.find(s=>s.id===activeSessionId); if(s){s.history=[...currentHistory];s.timestamp=Date.now();saveSessions();} }
function loadSession(id){ const s=sessions.find(s=>s.id===id); if(!s) return; updateSession(); activeSessionId=s.id; currentHistory=[...s.history]; responseBox.innerHTML=''; isFirstMessage=false; body.classList.add('chat-active'); const msgs=currentHistory.filter(m=>m.role!=='system'); msgs.forEach(m=>{ if(m.role==='user'){ const t=typeof m.content==='string'?m.content:(m.content[0]?.text||''); appendMsg('user',t); } else if(m.role==='assistant'){ const w=appendMsg('bot',''); w.querySelector('.text-body').innerHTML=marked.parse(m.content); } }); viewport.scrollTop=viewport.scrollHeight; renderSidebar(); closeSidebar(); inputField.focus(); }
function deleteSession(id,e){ e.stopPropagation(); sessions=sessions.filter(s=>s.id!==id); saveSessions(); if(activeSessionId===id){currentHistory=[];responseBox.innerHTML='';body.classList.remove('chat-active');isFirstMessage=true;activeSessionId=null;} renderSidebar(); }
function renderSidebar(){ const list=document.getElementById('history-list'); list.innerHTML=''; if(!sessions.length){list.innerHTML='<div class="history-empty">No sessions yet.</div>';return;} sessions.forEach(s=>{ const item=document.createElement('div'); item.className='history-item'+(s.id===activeSessionId?' active':''); item.innerHTML=`<div class="history-item-label">${esc(s.title)}</div><div class="history-delete">✕</div>`; item.querySelector('.history-item-label').addEventListener('click',()=>loadSession(s.id)); item.querySelector('.history-delete').addEventListener('click',e=>deleteSession(s.id,e)); list.appendChild(item); }); }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function toggleSidebar(){ document.getElementById('history-sidebar').classList.contains('open')?closeSidebar():openSidebar(); }
function openSidebar(){ document.getElementById('history-sidebar').classList.add('open'); document.getElementById('sidebar-backdrop').classList.add('visible'); }
function closeSidebar(){ document.getElementById('history-sidebar').classList.remove('open'); document.getElementById('sidebar-backdrop').classList.remove('visible'); }
function startNewChat(){ updateSession(); currentHistory=[];responseBox.innerHTML='';body.classList.remove('chat-active');isFirstMessage=true;activeSessionId=null;renderSidebar();inputField.focus(); }

function openModal(id){ document.getElementById(id).style.display='flex'; }
function closeModal(id){ document.getElementById(id).style.display='none'; }
function switchTab(id){ document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); event.currentTarget.classList.add('active'); ['general','model','appearance'].forEach(t=>document.getElementById('tab-'+t).style.display=t===id?'block':'none'); }

function updateAccentColor(hex){ document.documentElement.style.setProperty('--accent-color',hex); const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16); document.documentElement.style.setProperty('--accent-glow',`rgba(${r},${g},${b},0.3)`); }

inputField.addEventListener('keypress',e=>{ if(e.key==='Enter'&&!isGenerating) sendMessage(); });
function handleAction(){ isGenerating?stopGeneration():sendMessage(); }
function stopGeneration(){ if(abortController){abortController.abort();isGenerating=false;setUI(false);} }
function setUI(gen){
    isGenerating=gen;
    if(gen){ sendBtn.classList.replace('idle','generating'); inputField.disabled=true; animateStar(); }
    else { sendBtn.classList.replace('generating','idle'); inputField.disabled=false; inputField.focus(); }
}

async function sendMessage(){
    const textVal=inputField.value.trim();
    const model=document.getElementById('active-model').value;
    const temp=parseFloat(document.getElementById('param-temp').value);
    const sys=document.getElementById('sys-prompt').value;
    if(!textVal&&!selectedFiles.length) return;

    if(isFirstMessage&&!activeSessionId) createSession(textVal);
    setUI(true); abortController=new AbortController();
    if(isFirstMessage){ body.classList.add('chat-active'); isFirstMessage=false; }
    if(!currentHistory.length||currentHistory[0].role!=='system') currentHistory.unshift({role:'system',content:sys});
    else currentHistory[0].content=sys;

    appendMsg('user',textVal);
    let content, actualModel=model;
    if(selectedFiles.length){
        actualModel=VISION_MODEL;
        content=[{type:'text',text:textVal}];
        for(const f of selectedFiles){ const b64=await fileToBase64(f); content.push({type:'image_url',image_url:{url:`data:image/jpeg;base64,${b64}`}}); }
    } else content=textVal;

    currentHistory=trimHistory(currentHistory);
    currentHistory.push({role:'user',content});
    inputField.value='';
    const backup=[...selectedFiles]; selectedFiles=[]; renderPreviews();
    const botWrapper=appendMsg('bot','…');
    const textBody=botWrapper.querySelector('.text-body');

    try{
        const res=await fetch('https://api.groq.com/openai/v1/chat/completions',{
            method:'POST',
            headers:{'Authorization':`Bearer ${GROQ_API_KEY}`,'Content-Type':'application/json'},
            body:JSON.stringify({model:actualModel,messages:currentHistory,temperature:temp,max_tokens:2048}),
            signal:abortController.signal
        });
        const data=await res.json();
        if(!res.ok) throw new Error(data.error?.message||'API error '+res.status);
        const txt=data.choices[0].message.content;
        if(backup.length) currentHistory[currentHistory.length-1].content=`[Image]: ${textVal}`;
        currentHistory.push({role:'assistant',content:txt});
        currentHistory=trimHistory(currentHistory);
        await streamResponse(textBody,txt);
        updateSession();
    }catch(e){
        if(e.name==='AbortError'){ textBody.textContent='Stopped.'; }
        else { textBody.innerHTML=`<span style="color:#f06292;">Error: ${e.message}</span>`; selectedFiles=backup; renderPreviews(); }
    }finally{ setUI(false); }
}

function appendMsg(role,text){
    const div=document.createElement('div');
    if(role==='user'){ div.className='user-message'; div.textContent=text; }
    else { div.className='bot-message-wrapper'; div.innerHTML=`<div style="font-size:22px;flex-shrink:0;line-height:1;">🌸</div><div class="bot-content"><div class="bot-label-row"><div class="bot-label">BLOSSOM AI</div></div><div class="text-body">${text}</div></div>`; }
    responseBox.appendChild(div); viewport.scrollTo({top:viewport.scrollHeight,behavior:'smooth'}); return div;
}
async function streamResponse(el,text){
    el.innerHTML=''; let cur='',i=0; const chunk=12;
    while(i<text.length){ if(!isGenerating) break; cur+=text.slice(i,i+chunk); i+=chunk; el.innerHTML=marked.parse(cur); viewport.scrollTop=viewport.scrollHeight; await new Promise(r=>setTimeout(r,8)); }
    el.innerHTML=marked.parse(text);
}
function trimHistory(h){ if(h.length<=MAX_HISTORY+1) return h; return [h[0],...h.slice(-MAX_HISTORY)]; }
function fileToBase64(f){ return new Promise((res,rej)=>{ const r=new FileReader(); r.readAsDataURL(f); r.onload=()=>res(r.result.split(',')[1]); r.onerror=rej; }); }
function animateStar(){ if(!isGenerating){star.style.transform='rotate(0deg)';cancelAnimationFrame(animationFrameId);return;} rotationAngle+=(2+Math.sin(Date.now()/500)*4); star.style.transform=`rotate(${rotationAngle}deg)`; animationFrameId=requestAnimationFrame(animateStar); }
function handleFileUpload(i){ Array.from(i.files).forEach(f=>{if(selectedFiles.length<5)selectedFiles.push(f);}); i.value=''; renderPreviews(); }
function renderPreviews(){ previewBar.innerHTML=''; selectedFiles.forEach((f,i)=>{ const r=new FileReader(); const w=document.createElement('div'); w.className='preview-item'; r.onload=e=>{w.innerHTML=`<img src="${e.target.result}"><div class="remove-img" onclick="removeImage(${i})">✕</div>`;}; r.readAsDataURL(f); previewBar.appendChild(w); }); uploadCounter.textContent=`${selectedFiles.length}/5`; }
function removeImage(i){ selectedFiles.splice(i,1); renderPreviews(); }

loadSessions(); renderSidebar();
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal('settings-modal'); });
</script>
</body>
</html>
